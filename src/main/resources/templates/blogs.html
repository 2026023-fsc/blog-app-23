<!DOCTYPE html>
<html lang="ja" xmlns="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style2.css">
    <title>All Blogs</title>
</head>

<body>
    <header class="blog-header">
        <div class="blog-title">みんなのブログ</div>

        <nav class="site-nav">
            <ul>
                <li><a href="/blogs">ホーム（一覧）</a></li>
                <li><a href="/blogs/Post">新規投稿</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <h1>みんなのブログ一覧</h1>
        <p th:if="${#lists.isEmpty(blogs)}">まだ投稿が０件だよ</p>
        <table th:if="${not #lists.isEmpty(blogs)}">
            <tr th:each="blog : ${blogs}">
                <td>
                    <span th:text="${blog.name}"></span>
                    <a th:href="@{/blogs/{id}(id=${blog.id})}" th:text="${blog.title}"></a>
                </td>
            </tr>
        </table>
    </div>
</body>
</html>
